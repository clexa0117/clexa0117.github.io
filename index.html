<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一个无法逃避的灵魂拷问(地狱模式)</title>
  <style>
    body {
      text-align: center;
      font-family: '微软雅黑', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #fce4ec; 
      overflow: hidden; 
    }

    #question-section {
      transition: opacity 0.5s; 
    }

    h1 {
      color: #333;
      font-size: 40px;
      margin-bottom: 50px;
    }

    .btn-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      position: relative; 
      width: 300px;
      height: 100px;
    }

    button {
      padding: 15px 40px;
      font-size: 24px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background-color: #fff;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #ffd54f;
    }

    #no-btn {
      z-index: 999; 
    }

    #result-section {
      display: none; 
      text-align: center;
    }

    #peppa-img {
      width: 250px; 
      height: auto;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div id="question-section">
    <h1>你是猪吗？</h1>
    <div class="btn-box">
      <button id="yes-btn" onclick="sayYes()">是</button>
      <button id="no-btn" onmouseover="evade()">不是</button>
    </div>
  </div>

  <div id="result-section">
    <img id="peppa-img" src="peppa.jpg" alt="小猪佩奇">
    <br><br>
    <h1>你好👋，小猪佩奇。</h1>
  </div>

  <script>
    function sayYes() {
      document.getElementById("question-section").style.display = "none";
      document.getElementById("result-section").style.display = "block";
    }

    function evade() {
      const btn = document.getElementById('no-btn');
      
      const maxWidth = window.innerWidth;
      const maxHeight = window.innerHeight;

      const btnWidth = btn.offsetWidth;
      const btnHeight = btn.offsetHeight;

      const safeWidth = maxWidth - btnWidth;
      const safeHeight = maxHeight - btnHeight;

      const randomX = Math.floor(Math.random() * safeWidth);
      const randomY = Math.floor(Math.random() * safeHeight);

      btn.style.position = 'fixed';
      btn.style.left = randomX + 'px';
      btn.style.top = randomY + 'px';
    }
  </script>
</body>
</html>
